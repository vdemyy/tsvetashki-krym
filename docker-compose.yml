services:
  db:
    image: postgres:15-alpine
    container_name: tsvetashki_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tsvetashki}
      POSTGRES_USER: ${POSTGRES_USER:-tsvetashki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-tsvetashki}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: tsvetashki_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - tsvetashki_data:/app/data
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tsvetashki}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tsvetashki}
    depends_on:
      db:
        condition: service_healthy

  bot:
    profiles: ["bot"]
    build: .
    container_name: tsvetashki_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
      - tsvetashki_data:/app/data
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tsvetashki}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tsvetashki}
    command: ["python", "-m", "telegram_bot.bot"]
    depends_on:
      db:
        condition: service_healthy

  # Отдельный сервис для одноразовой проверки уведомлений (можно запускать по cron)
  notification_worker:
    profiles: ["bot", "worker"]
    build: .
    container_name: tsvetashki_notifier
    restart: "no"
    env_file:
      - .env
    volumes:
      - .:/app
      - tsvetashki_data:/app/data
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tsvetashki}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tsvetashki}
    command: ["python", "-m", "telegram_bot.notification_worker"]
    depends_on:
      db:
        condition: service_healthy

  # pgAdmin - веб-интерфейс для управления PostgreSQL
  pgadmin:
    profiles: ["dev"]
    image: dpage/pgadmin4:latest
    container_name: tsvetashki_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  tsvetashki_data:
  postgres_data:
  pgadmin_data: