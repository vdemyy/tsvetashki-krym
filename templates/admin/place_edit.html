{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<h1 class="h1">{{ title }}</h1>
<p><a href="/admin/places">Назад</a></p>
<form class="filters" method="post" action="{{ '/admin/places/' ~ row.id ~ '/edit' if row else '/admin/places/new' }}" style="display:block;max-width:520px">
  <label>Название
    <input name="name" required value="{{ row.name if row else '' }}">
  </label>
  <label>Регион (Южный Крым, Восточный Крым…)
    <input name="region" value="{{ row.region or '' }}">
  </label>
  <label>Подрегион
    <input name="subregion" value="{{ row.subregion or '' }}">
  </label>
  <label>Широта
    <input name="latitude" type="number" step="any" required value="{{ row.latitude if row else '' }}">
  </label>
  <label>Долгота
    <input name="longitude" type="number" step="any" required value="{{ row.longitude if row else '' }}">
  </label>
  <button class="btn" type="submit" style="margin-top:0.75rem">Сохранить</button>
</form>
{% endblock %}
