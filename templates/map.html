{% extends "base.html" %}
{% block title %}Карта{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
.map-controls {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-width: 200px;
  pointer-events: auto;
  transition: right 0.3s ease;
}
/* Shift controls left when sidebar is open */
.sidebar:not(.sidebar--hidden) ~ .map-controls {
  right: calc(min(360px, 100%) + 12px);
}
@media (max-width: 820px) {
  .sidebar:not(.sidebar--hidden) ~ .map-controls {
    right: 12px;
  }
}
.map-ctrl-btn {
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  padding: 8px 13px;
  font-size: 0.8rem;
  font-weight: 700;
  font-family: var(--font, system-ui);
  cursor: pointer;
  box-shadow: var(--shadow);
  color: var(--fg);
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.2s ease;
  white-space: nowrap;
  pointer-events: auto;
}
.map-ctrl-btn:hover { 
  background: var(--bg-elev); 
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.map-ctrl-btn.active { 
  background: var(--accent); 
  color: #fff; 
  border-color: var(--accent);
  box-shadow: 0 4px 16px rgba(45,90,61,0.35);
}
/* Toggle switch for cloud layer */
.map-ctrl-toggle {
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  padding: 8px 13px;
  font-size: 0.8rem;
  font-weight: 700;
  font-family: var(--font, system-ui);
  cursor: pointer;
  box-shadow: var(--shadow);
  color: var(--fg);
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.2s ease;
  white-space: nowrap;
  pointer-events: auto;
  user-select: none;
}
.map-ctrl-toggle:hover {
  background: var(--bg-elev);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}
.map-ctrl-checkbox {
  display: none;
}
.map-ctrl-checkbox:checked + .map-ctrl-label {
  color: var(--accent);
}
.map-ctrl-toggle:has(.map-ctrl-checkbox:checked) {
  background: var(--accent-soft);
  border-color: var(--accent);
}
.map-ctrl-label {
  display: flex;
  align-items: center;
  gap: 7px;
  color: var(--fg);
  transition: color 0.2s ease;
}
.ctrl-ico { font-size: 1.05rem; line-height: 1; }
.map-legend {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 1000;
  background: var(--bg-card);
  backdrop-filter: blur(10px);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px 14px;
  box-shadow: var(--shadow-md);
  font-size: 0.78rem;
  max-width: 180px;
  pointer-events: auto;
  transition: left 0.3s ease;
}
/* Shift legend right when sidebar is open on mobile */
@media (max-width: 820px) {
  .sidebar:not(.sidebar--hidden) ~ .map-legend {
    bottom: calc(60vh + 20px);
  }
}
.map-legend__title {
  font-weight: 800;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--accent);
  margin: 0 0 8px;
}
.map-legend__item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 5px 0;
}
.map-legend__dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.9);
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  flex-shrink: 0;
}
.map-legend__label {
  color: var(--fg);
  font-weight: 600;
}
@media (max-width: 640px) {
  .map-controls { 
    top: 8px; 
    right: 8px; 
    max-width: 160px;
  }
  .map-ctrl-btn {
    padding: 7px 11px;
    font-size: 0.75rem;
    gap: 6px;
  }
  .ctrl-ico {
    font-size: 0.95rem;
  }
  .map-legend { 
    bottom: 12px; 
    left: 12px; 
    font-size: 0.72rem; 
    padding: 10px 12px;
    max-width: 150px;
  }
  .map-legend__title {
    font-size: 0.68rem;
  }
}
/* Ensure Leaflet controls don't overlap */
.leaflet-top.leaflet-right {
  top: 70px !important;
  transition: right 0.3s ease;
}
.sidebar:not(.sidebar--hidden) ~ #map .leaflet-top.leaflet-right {
  right: calc(min(360px, 100%) + 10px) !important;
}
@media (max-width: 820px) {
  .leaflet-top.leaflet-right {
    top: 60px !important;
  }
  .sidebar:not(.sidebar--hidden) ~ #map .leaflet-top.leaflet-right {
    right: 10px !important;
  }
}
</style>
{% endblock %}
{% block content %}
<div class="map-layout" style="position:relative">
  <div id="map" class="map-canvas" role="application" aria-label="Карта явлений"></div>
  
  <aside id="sidebar" class="sidebar sidebar--hidden" aria-live="polite">
    <button type="button" id="sidebar-close" class="sidebar__close" aria-label="Закрыть">×</button>
    <div id="sidebar-inner"></div>
  </aside>
  
  <div class="map-controls">
    <label class="map-ctrl-toggle" title="Показать облачность">
      <input type="checkbox" id="clouds-toggle" class="map-ctrl-checkbox">
      <span class="map-ctrl-label">
        <span class="ctrl-ico">☁️</span> Облачность
      </span>
    </label>
  </div>
  
  <div class="map-legend">
    <div class="map-legend__title">Статус</div>
    <div class="map-legend__item">
      <div class="map-legend__dot" style="background:#2f6b47"></div>
      <div class="map-legend__label">Идёт</div>
    </div>
    <div class="map-legend__item">
      <div class="map-legend__dot" style="background:#b07d3a"></div>
      <div class="map-legend__label">Скоро</div>
    </div>
    <div class="map-legend__item">
      <div class="map-legend__dot" style="background:#5a7a8a"></div>
      <div class="map-legend__label">Позже</div>
    </div>
    <div class="map-legend__item">
      <div class="map-legend__dot" style="background:#8a9090"></div>
      <div class="map-legend__label">Завершено</div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" defer></script>
<script src="/static/js/map.js" defer></script>
{% endblock %}
