{% extends "base.html" %}
{% block title %}Карта{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
{% endblock %}
{% block content %}
<div class="map-layout">
  <div id="map" class="map-canvas" role="application" aria-label="Карта явлений"></div>
  <aside id="sidebar" class="sidebar sidebar--hidden" aria-live="polite">
    <button type="button" id="sidebar-close" class="sidebar__close" aria-label="Закрыть">×</button>
    <div id="sidebar-inner"></div>
  </aside>
</div>
{% endblock %}
{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" defer></script>
<script src="/static/js/map.js" defer></script>
{% endblock %}
