<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ title or "Цветашки Крым" }}{% endblock %} · Цветашки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,500;0,7..72,600;1,7..72,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="logo" href="/">
        <i data-lucide="map" class="logo__mark lucide-icon" aria-hidden="true"></i>
        <span class="logo__text">Цветашки</span>
      </a>
      <nav class="nav" aria-label="Разделы">
        <a class="nav__link" href="/" {% if request.url.path == "/" %}aria-current="page"{% endif %}>
          <i data-lucide="layout-list" class="nav__ico" aria-hidden="true"></i>
          Лента
        </a>
        <a class="nav__link" href="/map" {% if request.url.path.startswith("/map") %}aria-current="page"{% endif %}>
          <i data-lucide="map-pinned" class="nav__ico" aria-hidden="true"></i>
          Карта
        </a>
        <a class="nav__link nav__link--ghost" href="/admin/login">
          <i data-lucide="shield" class="nav__ico" aria-hidden="true"></i>
          Вход
        </a>
      </nav>
    </div>
    <p class="tagline">Сезонные явления Крыма — сухие факты, тихий интерфейс.</p>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <span>Ориентир для поездок. Погода и даты уточняйте перед выездом.</span>
  </footer>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
  <script src="/static/js/lucide-init.js" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
