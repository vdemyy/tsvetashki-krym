<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Календарь цветения и природных явлений Крыма — лаванда, маки, сакура, закаты и не только. Даты, карта, уведомления.">
  <meta name="keywords" content="Крым, цветение, лаванда, сакура, маки, природные явления, сезонный календарь">
  <meta name="author" content="Цветашки Крым">
  <!-- Open Graph -->
  <meta property="og:title" content="{% block og_title %}{{ title or 'Цветашки Крым' }}{% endblock %}">
  <meta property="og:description" content="Календарь цветения и природных явлений Крыма. Узнайте, что цветёт сейчас!">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ru_RU">
  <title>{% block title %}{{ title or "Цветашки Крым" }}{% endblock %} · Цветашки</title>
  <!-- Prevent FOUC (Flash of Unstyled Content) -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const autoTheme = localStorage.getItem('autoTheme');
      if (savedTheme && autoTheme !== 'true') {
        document.documentElement.setAttribute('data-theme', savedTheme);
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,500;0,7..72,600;1,7..72,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css?v=18">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#2f6b47">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const isTg = urlParams.has('tg') || (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData);
      if (isTg) {
        document.documentElement.classList.add('tg-app');
        window.addEventListener('DOMContentLoaded', function() {
          document.body.classList.add('tg-app');
          if (window.Telegram && window.Telegram.WebApp) {
            const webapp = window.Telegram.WebApp;
            webapp.ready();
            webapp.expand();
            
            const applyTheme = (colorScheme) => {
              if (colorScheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
              } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
              }
            };
            applyTheme(webapp.colorScheme);
            webapp.onEvent('themeChanged', function() {
              applyTheme(webapp.colorScheme);
            });
            
            if (window.location.pathname !== '/map') {
              if (webapp.BackButton) {
                webapp.BackButton.show();
                webapp.BackButton.offClick();
                webapp.BackButton.onClick(function() {
                  window.history.back();
                });
              }
            } else {
              if (webapp.BackButton) {
                webapp.BackButton.hide();
              }
            }
          }
        });
      }
    })();
  </script>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="logo" href="/">
        <img src="/static/img/logo.png" alt="Цветение Крыма" class="logo__img" loading="lazy">
        <span class="logo__text">Календарь цветения и природных явлений полуострова</span>
      </a>
      <nav class="nav" aria-label="Разделы">
        <a class="nav__link" href="/" {% if request.url.path == "/" %}aria-current="page"{% endif %}>
          <i data-lucide="layout-list" class="nav__ico" aria-hidden="true"></i>
          Лента
        </a>
        <a class="nav__link" href="/map" {% if request.url.path.startswith("/map") %}aria-current="page"{% endif %}>
          <i data-lucide="map-pinned" class="nav__ico" aria-hidden="true"></i>
          Карта
        </a>
        <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
          <span class="theme-toggle__icon-wrap">
            <i data-lucide="sun" class="theme-toggle__icon theme-toggle__icon--light" aria-hidden="true"></i>
            <i data-lucide="moon" class="theme-toggle__icon theme-toggle__icon--dark" aria-hidden="true"></i>
          </span>
          <span class="theme-toggle__text" id="themeToggleText"></span>
        </button>
        <a class="nav__link nav__link--ghost" href="/admin/login">
          <i data-lucide="shield" class="nav__ico" aria-hidden="true"></i>
          Вход
        </a>
      </nav>
    </div>
    <p class="tagline">Календарь цветения и природных явлений полуострова</p>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <span>Ориентир для поездок. Погода и даты уточняйте перед выездом.</span>
  </footer>
  <div class="toast-container" id="toastContainer"></div>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
  <script src="/static/js/lucide-init.js?v=18" defer></script>
  <script src="/static/js/theme.js?v=18" defer></script>
  <script src="/static/js/petals.js?v=18" defer></script>
  <script src="/static/js/fireflies.js?v=18" defer></script>
  <script>
    // Flash messages / toast notifications
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('_subscribed')) {
        const container = document.getElementById('toastContainer');
        if (container) {
          const toast = document.createElement('div');
          toast.className = 'toast toast--success';
          toast.innerHTML = `
            <svg class="toast__icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <div class="toast__content">Вы успешно подписались на уведомления о явлении!</div>
            <button type="button" class="toast__close" aria-label="Закрыть" onclick="this.parentElement.classList.add('toast--fade-out'); setTimeout(() => this.parentElement.remove(), 300)">
              <svg style="width:1rem;height:1rem" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          `;
          container.appendChild(toast);
          
          // Auto dismiss after 5 seconds
          setTimeout(() => {
            if (toast && toast.parentElement) {
              toast.classList.add('toast--fade-out');
              setTimeout(() => toast.remove(), 300);
            }
          }, 5000);
        }
        
        // Clean up URL query parameters without reloading
        const url = new URL(window.location);
        url.searchParams.delete('_subscribed');
        window.history.replaceState({}, document.title, url.toString());
      }
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
